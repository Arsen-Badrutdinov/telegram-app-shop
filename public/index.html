<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Knight Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
    <!-- Epic Design: Scene Wrapper with Depth Layers -->
    <section class="scene" id="mainScene">
        
        <!-- DEPTH 0: Deep Background -->
        <div class="layer depth-0" data-depth="0" aria-hidden="true"></div>
        
        <!-- DEPTH 1: Atmospheric Glows -->
        <div class="layer depth-1" data-depth="1" aria-hidden="true">
            <div class="glow-blob"></div>
            <div class="glow-blob secondary"></div>
        </div>

        <!-- DEPTH 2: Midground Elements (blur & scale handling in CSS) -->
        <div class="layer depth-2" data-depth="2" aria-hidden="true">
            <!-- Decorative particles will be generated by JS -->
        </div>

        <!-- DEPTH 3: Main Content (Products) -->
        <div class="layer depth-3" data-depth="3">
            <header class="ios-header glass">
                <div class="header-content">
                    <h1 class="split-text">DARK KNIGHT</h1>
                    <p class="subtitle">Urban Tactical Gear</p>
                </div>
                <div class="support-link">
                    <a href="https://t.me/SCK_Official" onclick="openSupport(event)">Support @SCK_Official</a>
                </div>
            </header>

            <main class="content">
                <div class="search-bar glass">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search arsenal...">
                </div>

                <div class="products-grid" id="productsGrid">
                    <!-- Products rendered via JS -->
                </div>
            </main>
        </div>

        <!-- DEPTH 5: Foreground Modals / UI Overlays -->
        <div class="layer depth-5 modal-layer" id="productModal" aria-hidden="true">
            <div class="modal-backdrop" onclick="closeModals()"></div>
            <div class="modal-content glass-card">
                <button class="close-btn" onclick="closeModals()">×</button>
                <div class="modal-image-wrapper">
                    <img id="modalImage" src="" alt="Product Image" class="float-loop">
                </div>
                <h2 id="modalTitle"></h2>
                <p id="modalPrice" class="accent-text"></p>
                <div class="description-text">
                    <p>High-performance tactical gear designed for urban environments. Engineered for durability, stealth, and ultimate mobility.</p>
                    <ul class="specs-list">
                        <li>Premium Materials</li>
                        <li>Water Resistant</li>
                        <li>Modular Pockets</li>
                    </ul>
                </div>
                <button class="action-btn epic-btn" id="openCheckoutBtn">Proceed to Checkout</button>
            </div>
        </div>

        <div class="layer depth-5 modal-layer" id="checkoutModal" aria-hidden="true">
            <div class="modal-backdrop" onclick="closeModals()"></div>
            <div class="modal-content glass-card checkout-card">
                <button class="close-btn" onclick="closeModals()">×</button>
                <h2>Order Checkout</h2>
                <div class="checkout-summary">
                    <img id="checkoutImage" src="" alt="Item">
                    <div class="checkout-details">
                        <strong id="checkoutItemName"></strong>
                        <p class="checkout-qty">Qty: 1</p>
                    </div>
                </div>
                <div class="checkout-total">
                    <span>Total:</span>
                    <strong class="accent-text" id="checkoutPrice"></strong>
                </div>
                <button class="action-btn epic-btn success-btn" id="confirmOrderBtn">Pay & Send Receipt</button>
            </div>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
